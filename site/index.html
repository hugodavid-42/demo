<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site</title>
  <style>
    body {
      background: #0d0f0e;
      color: #c8d5c9;
      font-family: monospace;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }

    .box {
      border: 1px solid #2a2f2b;
      border-radius: 8px;
      width: 100%;
      max-width: 550px;
      overflow: hidden;
    }

    .bar {
      background: #1a1d1b;
      border-bottom: 1px solid #2a2f2b;
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .body {
      padding: 20px;
      line-height: 2;
    }

    .green { color: #39ff85; }
    .muted { color: #4a5c4b; padding-left: 18px; display: block; }

    a {
      color: #39ff85;
      text-decoration: none;
      border: 1px solid #2a5c3b;
      padding: 2px 12px;
      border-radius: 4px;
      margin-right: 8px;
    }

    a:hover { background: rgba(57,255,133,0.1); }

    .links { padding-left: 18px; margin: 4px 0; }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #4a5c4b;
      text-align: center;
    }

    footer a {
      border: none;
      padding: 0;
      color: #39ff85;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="bar">
      <span class="dot" style="background:#ff5f57"></span>
      <span class="dot" style="background:#febc2e"></span>
      <span class="dot" style="background:#28c840"></span>
    </div>
    <div class="body">
      <p><span class="green">$</span> whoami</p>
      <span class="muted">Your Name Here</span>

      <p><span class="green">$</span> cat about.txt</p>
      <span class="muted">Welcome to my site. Edit this page to make it yours.</span>

      <p><span class="green">$</span> ls links/</p>
      <div class="links">
        <a href="#">github</a>
        <a href="#">twitter</a>
        <a href="#">youtube</a>
      </div>

      <p><span class="green">$</span> <span class="green">█</span></p>
    </div>
  </div>

  <footer>
    Deployed on <a href="https://akash.network" target="_blank">Akash Network</a>
    &nbsp;·&nbsp;
    Template by <a href="https://github.com/hugodavid-42/akash-static-template" target="_blank">akash-static-template</a>
  </footer>

</body>
</html>
