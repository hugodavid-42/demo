<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site — Edit me</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="scanline"></div>

  <main>

    <div class="terminal-window">
      <div class="terminal-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">~/my-site</span>
      </div>
      <div class="terminal-body">
        <p class="line" style="--d:0.1s"><span class="prompt">$</span> <span class="cmd">whoami</span></p>
        <p class="line output" style="--d:0.4s">Your Name Here</p>

        <p class="line" style="--d:0.8s"><span class="prompt">$</span> <span class="cmd">cat about.txt</span></p>
        <p class="line output" style="--d:1.1s">Welcome to my site. Edit this page to make it yours.</p>
        <p class="line output" style="--d:1.3s">This template is deployed on Akash Network.</p>

        <p class="line" style="--d:1.7s"><span class="prompt">$</span> <span class="cmd">ls links/</span></p>
        <div class="line links-grid" style="--d:2.0s">
          <a href="#" class="link-item">github</a>
          <a href="#" class="link-item">twitter</a>
          <a href="#" class="link-item">youtube</a>
        </div>

        <p class="line" style="--d:2.4s"><span class="prompt">$</span> <span class="cursor-line"><span class="cursor">█</span></span></p>
      </div>
    </div>

  </main>

  <footer>
    <span>Deployed on</span>
    <a href="https://akash.network" target="_blank" rel="noopener">Akash Network</a>
    <span class="sep">·</span>
    <span>Template by</span>
    <a href="https://github.com/hugodavid-42/akash-static-template" target="_blank" rel="noopener">akash-static-template</a>
  </footer>

</body>
</html>
